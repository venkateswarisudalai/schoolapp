<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <!-- Book icon -->
  <g transform="translate(512, 480)">
    <!-- Open book base -->
    <path d="M-280 -120 L-280 180 Q0 220 0 220 Q0 220 280 180 L280 -120 Q0 -80 0 -80 Q0 -80 -280 -120 Z" fill="#ffffff" opacity="0.95"/>
    <!-- Book spine -->
    <path d="M0 -80 L0 220" stroke="#4F46E5" stroke-width="8" opacity="0.3"/>
    <!-- Left page lines -->
    <line x1="-220" y1="-40" x2="-40" y2="-20" stroke="#4F46E5" stroke-width="6" opacity="0.2"/>
    <line x1="-220" y1="20" x2="-40" y2="40" stroke="#4F46E5" stroke-width="6" opacity="0.2"/>
    <line x1="-220" y1="80" x2="-40" y2="100" stroke="#4F46E5" stroke-width="6" opacity="0.2"/>
    <!-- Right page lines -->
    <line x1="220" y1="-40" x2="40" y2="-20" stroke="#4F46E5" stroke-width="6" opacity="0.2"/>
    <line x1="220" y1="20" x2="40" y2="40" stroke="#4F46E5" stroke-width="6" opacity="0.2"/>
    <line x1="220" y1="80" x2="40" y2="100" stroke="#4F46E5" stroke-width="6" opacity="0.2"/>
  </g>
  <!-- Graduation cap -->
  <g transform="translate(512, 280)">
    <polygon points="0,-80 180,0 0,40 -180,0" fill="#ffffff"/>
    <rect x="-20" y="0" width="40" height="60" fill="#ffffff"/>
    <ellipse cx="0" cy="60" rx="60" ry="20" fill="#ffffff"/>
    <!-- Tassel -->
    <line x1="180" y1="0" x2="180" y2="80" stroke="#FCD34D" stroke-width="8"/>
    <circle cx="180" cy="90" r="15" fill="#FCD34D"/>
  </g>
  <!-- App name -->
  <text x="512" y="780" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#ffffff" text-anchor="middle">MAYURI</text>
  <text x="512" y="860" font-family="Arial, sans-serif" font-size="50" fill="#ffffff" opacity="0.8" text-anchor="middle">SCHOOL</text>
</svg>
