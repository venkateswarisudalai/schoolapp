<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Admin - Mayuri School App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    .success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    .info {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
      margin-bottom: 20px;
    }
    .credentials {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      color: #856404;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .credentials h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }
    .credentials p {
      margin: 5px 0;
      font-family: 'Courier New', monospace;
    }
    .credentials strong {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌸 Create Admin Account</h1>
    <p class="subtitle">Mayuri School Management App</p>

    <div class="info">
      <strong>📧 Admin Email:</strong> venki10march@gmail.com<br>
      <strong>🔑 Default Password:</strong> MayuriAdmin@2026<br>
      <small>(You can change this after first login)</small>
    </div>

    <form id="createAdminForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" value="venki10march@gmail.com" disabled>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" value="MayuriAdmin@2026" required>
        <small style="color: #666; font-size: 12px;">Min 8 characters (you can change this)</small>
      </div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" value="Vignesh - School Administrator" required>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" value="+91 9876543210" required>
      </div>

      <button type="submit" id="createBtn">Create Admin Account</button>
    </form>

    <div id="message"></div>
    <div id="credentials" style="display: none;" class="credentials"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBktAXNzw4AIb2oeqUS41poSbnH45qR940",
      authDomain: "school-c0203.firebaseapp.com",
      projectId: "school-c0203",
      storageBucket: "school-c0203.firebasestorage.app",
      messagingSenderId: "910785587784",
      appId: "1:910785587784:web:3875a96ee99fc7667bc67d"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('createAdminForm');
    const messageDiv = document.getElementById('message');
    const credentialsDiv = document.getElementById('credentials');
    const createBtn = document.getElementById('createBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;

      messageDiv.innerHTML = '';
      credentialsDiv.style.display = 'none';
      createBtn.disabled = true;
      createBtn.textContent = 'Creating...';

      try {
        // Create user in Firebase Authentication
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Create user document in Firestore
        await setDoc(doc(db, 'users', user.uid), {
          email: email,
          name: name,
          role: 'admin',
          approvalStatus: 'approved',
          phone: phone,
          createdAt: serverTimestamp(),
        });

        // Show success message
        messageDiv.className = 'message success';
        messageDiv.innerHTML = '✅ Admin account created successfully!';

        // Show credentials
        credentialsDiv.style.display = 'block';
        credentialsDiv.innerHTML = `
          <h3>🎉 Admin Account Created!</h3>
          <p><strong>Email:</strong> ${email}</p>
          <p><strong>Password:</strong> ${password}</p>
          <p><strong>User ID:</strong> ${user.uid}</p>
          <br>
          <p><strong>🌐 Login at:</strong> <a href="https://school-c0203.web.app" target="_blank">https://school-c0203.web.app</a></p>
          <br>
          <small>⚠️ Important: Change your password after first login!</small>
        `;

        createBtn.textContent = '✓ Account Created';

        // Auto-redirect to app after 3 seconds
        setTimeout(() => {
          window.location.href = 'https://school-c0203.web.app';
        }, 5000);

      } catch (error) {
        console.error('Error:', error);
        messageDiv.className = 'message error';

        if (error.code === 'auth/email-already-in-use') {
          messageDiv.innerHTML = '⚠️ This email is already registered. Try logging in at <a href="https://school-c0203.web.app" target="_blank">the app</a>.';
        } else if (error.code === 'auth/weak-password') {
          messageDiv.innerHTML = '❌ Password is too weak. Use at least 6 characters.';
        } else {
          messageDiv.innerHTML = `❌ Error: ${error.message}`;
        }

        createBtn.disabled = false;
        createBtn.textContent = 'Try Again';
      }
    });
  </script>
</body>
</html>
